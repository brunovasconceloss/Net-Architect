<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg" cx="45%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#020b14"/>
    </radialGradient>
    <!-- Center node glow -->
    <radialGradient id="centerGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="60%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </radialGradient>
    <!-- Outer node gradient -->
    <radialGradient id="nodeGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </radialGradient>
    <!-- Glow filter for lines -->
    <filter id="lineGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Glow filter for center node -->
    <filter id="centerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Glow filter for satellite nodes -->
    <filter id="nodeGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Clip to rounded square -->
    <clipPath id="roundedSquare">
      <rect x="0" y="0" width="1024" height="1024" rx="200" ry="200"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="200" ry="200" fill="url(#bg)"/>

  <g clip-path="url(#roundedSquare)">

    <!-- Subtle dot grid -->
    <g opacity="0.07" fill="#06b6d4">
      <circle cx="128" cy="128" r="3"/><circle cx="256" cy="128" r="3"/><circle cx="384" cy="128" r="3"/>
      <circle cx="512" cy="128" r="3"/><circle cx="640" cy="128" r="3"/><circle cx="768" cy="128" r="3"/><circle cx="896" cy="128" r="3"/>
      <circle cx="128" cy="256" r="3"/><circle cx="256" cy="256" r="3"/><circle cx="384" cy="256" r="3"/>
      <circle cx="512" cy="256" r="3"/><circle cx="640" cy="256" r="3"/><circle cx="768" cy="256" r="3"/><circle cx="896" cy="256" r="3"/>
      <circle cx="128" cy="384" r="3"/><circle cx="256" cy="384" r="3"/><circle cx="384" cy="384" r="3"/>
      <circle cx="512" cy="384" r="3"/><circle cx="640" cy="384" r="3"/><circle cx="768" cy="384" r="3"/><circle cx="896" cy="384" r="3"/>
      <circle cx="128" cy="512" r="3"/><circle cx="256" cy="512" r="3"/><circle cx="384" cy="512" r="3"/>
      <circle cx="640" cy="512" r="3"/><circle cx="768" cy="512" r="3"/><circle cx="896" cy="512" r="3"/>
      <circle cx="128" cy="640" r="3"/><circle cx="256" cy="640" r="3"/><circle cx="384" cy="640" r="3"/>
      <circle cx="512" cy="640" r="3"/><circle cx="640" cy="640" r="3"/><circle cx="768" cy="640" r="3"/><circle cx="896" cy="640" r="3"/>
      <circle cx="128" cy="768" r="3"/><circle cx="256" cy="768" r="3"/><circle cx="384" cy="768" r="3"/>
      <circle cx="512" cy="768" r="3"/><circle cx="640" cy="768" r="3"/><circle cx="768" cy="768" r="3"/><circle cx="896" cy="768" r="3"/>
      <circle cx="128" cy="896" r="3"/><circle cx="256" cy="896" r="3"/><circle cx="384" cy="896" r="3"/>
      <circle cx="512" cy="896" r="3"/><circle cx="640" cy="896" r="3"/><circle cx="768" cy="896" r="3"/><circle cx="896" cy="896" r="3"/>
    </g>

    <!-- Outer hex ring (architectural feel) -->
    <polygon points="512,140 756,371 756,653 512,884 268,653 268,371"
      fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.18"/>
    <polygon points="512,180 726,391 726,633 512,844 298,633 298,391"
      fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.10"/>

    <!-- ─── Connection lines: center → satellites ─── -->
    <!-- Using filter for glow effect on lines -->
    <g filter="url(#lineGlow)" stroke="#06b6d4" stroke-linecap="round">
      <!-- Center(512,512) → Top(512,232) -->
      <line x1="512" y1="512" x2="512" y2="232" stroke-width="5" opacity="0.75"/>
      <!-- Center → Top-Right(754,372) -->
      <line x1="512" y1="512" x2="754" y2="372" stroke-width="5" opacity="0.75"/>
      <!-- Center → Bottom-Right(754,652) -->
      <line x1="512" y1="512" x2="754" y2="652" stroke-width="5" opacity="0.75"/>
      <!-- Center → Bottom(512,792) -->
      <line x1="512" y1="512" x2="512" y2="792" stroke-width="5" opacity="0.75"/>
      <!-- Center → Bottom-Left(270,652) -->
      <line x1="512" y1="512" x2="270" y2="652" stroke-width="5" opacity="0.75"/>
      <!-- Center → Top-Left(270,372) -->
      <line x1="512" y1="512" x2="270" y2="372" stroke-width="5" opacity="0.75"/>
    </g>

    <!-- ─── Ring connections: satellite → satellite ─── -->
    <g stroke="#0891b2" stroke-linecap="round" opacity="0.45">
      <line x1="512" y1="232" x2="754" y2="372" stroke-width="3"/>
      <line x1="754" y1="372" x2="754" y2="652" stroke-width="3"/>
      <line x1="754" y1="652" x2="512" y2="792" stroke-width="3"/>
      <line x1="512" y1="792" x2="270" y2="652" stroke-width="3"/>
      <line x1="270" y1="652" x2="270" y2="372" stroke-width="3"/>
      <line x1="270" y1="372" x2="512" y2="232" stroke-width="3"/>
    </g>

    <!-- ─── Cross connections (diagonal mesh) ─── -->
    <g stroke="#0e7490" stroke-linecap="round" opacity="0.25" stroke-dasharray="12,8">
      <line x1="512" y1="232" x2="754" y2="652"/>
      <line x1="754" y1="372" x2="270" y2="652"/>
      <line x1="512" y1="792" x2="270" y2="372"/>
    </g>

    <!-- ─── Satellite nodes ─── -->
    <!-- Halo rings behind each node -->
    <g opacity="0.25" fill="none" stroke="#06b6d4" stroke-width="3">
      <circle cx="512" cy="232" r="44"/>
      <circle cx="754" cy="372" r="44"/>
      <circle cx="754" cy="652" r="44"/>
      <circle cx="512" cy="792" r="44"/>
      <circle cx="270" cy="652" r="44"/>
      <circle cx="270" cy="372" r="44"/>
    </g>

    <!-- Satellite node bodies -->
    <g filter="url(#nodeGlow)">
      <circle cx="512" cy="232" r="32" fill="url(#nodeGrad)"/>
      <circle cx="754" cy="372" r="32" fill="url(#nodeGrad)"/>
      <circle cx="754" cy="652" r="32" fill="url(#nodeGrad)"/>
      <circle cx="512" cy="792" r="32" fill="url(#nodeGrad)"/>
      <circle cx="270" cy="652" r="32" fill="url(#nodeGrad)"/>
      <circle cx="270" cy="372" r="32" fill="url(#nodeGrad)"/>
    </g>

    <!-- Satellite node inner bright dots -->
    <g fill="#a5f3fc">
      <circle cx="512" cy="232" r="14"/>
      <circle cx="754" cy="372" r="14"/>
      <circle cx="754" cy="652" r="14"/>
      <circle cx="512" cy="792" r="14"/>
      <circle cx="270" cy="652" r="14"/>
      <circle cx="270" cy="372" r="14"/>
    </g>

    <!-- ─── Center hub ─── -->
    <!-- Outer glow ring -->
    <circle cx="512" cy="512" r="95" fill="#06b6d4" opacity="0.12" filter="url(#centerGlow)"/>
    <!-- Outer ring -->
    <circle cx="512" cy="512" r="75" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.4"/>
    <!-- Hub body -->
    <circle cx="512" cy="512" r="62" fill="url(#centerGrad)" filter="url(#centerGlow)"/>
    <!-- Hub inner ring detail -->
    <circle cx="512" cy="512" r="42" fill="none" stroke="#a5f3fc" stroke-width="2.5" opacity="0.5"/>
    <!-- Hub core -->
    <circle cx="512" cy="512" r="28" fill="#a5f3fc"/>

    <!-- Subtle corner brackets (architectural blueprint feel) -->
    <g stroke="#06b6d4" stroke-width="4" stroke-linecap="round" opacity="0.35" fill="none">
      <!-- Top-left -->
      <polyline points="60,100 60,60 100,60"/>
      <!-- Top-right -->
      <polyline points="924,100 924,60 884,60"/>
      <!-- Bottom-left -->
      <polyline points="60,924 60,964 100,964"/>
      <!-- Bottom-right -->
      <polyline points="924,924 924,964 884,964"/>
    </g>
  </g>

  <!-- Rounded square border glow -->
  <rect x="2" y="2" width="1020" height="1020" rx="199" ry="199"
    fill="none" stroke="#06b6d4" stroke-width="3" opacity="0.2"/>
</svg>
