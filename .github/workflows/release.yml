name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install dependencies
        run: npm ci

      - name: Generate icon
        run: node scripts/build-icon.js

      - name: Build Windows installer
        run: npm run dist:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Net Architect ${{ github.ref_name }}
          body: |
            ## Net Architect ${{ github.ref_name }}

            **The Network Engineer's Partner** — offline subnet calculator, VLSM planner, topology visualizer, config generator, and real OS-level network testing.

            ### What's included
            - IPv4/IPv6 Subnet Calculator with prefix splitting
            - VLSM Planner
            - Network Topology Visualizer (ASCII + SVG)
            - Config Generator (Cisco, Juniper, Huawei)
            - Network Testing: Ping, Traceroute, Bulk Ping, TCP Ping, HTTP/DNS, iPerf3

            ### Installation
            Download `Net-Architect-Setup-*.exe` below and run it. No internet required after install.

            > ⚠️ Windows may show a SmartScreen warning (unsigned app). Click **"More info → Run anyway"** to proceed.
          files: dist/*.exe
          draft: false
          prerelease: false
